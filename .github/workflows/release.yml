name: Build Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/anis-release-keystore.jks

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        run: |
          echo "version_code=$(grep versionCode app/build.gradle.kts | grep -oE '[0-9]+' | head -1)" >> "$GITHUB_OUTPUT"
          echo "version_name=$(grep versionName app/build.gradle.kts | grep -oE '"[^"]*"' | head -1 | tr -d '"')" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.sha }}
          name: Release v${{ steps.version.outputs.version_name }}
          body: |
            Automated release from commit ${{ github.sha }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
