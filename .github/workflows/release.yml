name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ONNX model
        run: |
          gdrive_download() {
            local file_id="$1" output="$2"
            curl -sc /tmp/gcookies "https://drive.google.com/uc?export=download&id=${file_id}" > /dev/null
            local code=$(awk '/_warning_/ {print $NF}' /tmp/gcookies)
            curl -Lb /tmp/gcookies "https://drive.google.com/uc?export=download&confirm=${code}&id=${file_id}" -o "${output}"
          }
          gdrive_download "1byGexXvOXxA-tBzDZPBq0m0zDQUmjtOJ" \
            app/src/main/assets/vision_model_fp16.onnx

      - name: Download saved embeddings
        run: |
          gdrive_download() {
            local file_id="$1" output="$2"
            curl -sc /tmp/gcookies "https://drive.google.com/uc?export=download&id=${file_id}" > /dev/null
            local code=$(awk '/_warning_/ {print $NF}' /tmp/gcookies)
            curl -Lb /tmp/gcookies "https://drive.google.com/uc?export=download&confirm=${code}&id=${file_id}" -o "${output}"
          }
          gdrive_download "1uxZAy0Eal5jkIo9YLP7TBK4ps6Ho75Cz" \
            app/src/main/assets/saved_embeddings.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/anis-release-keystore.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :app:testDebug

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
